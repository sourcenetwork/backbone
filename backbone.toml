# Component version manifest.
#
# Single source of truth for binary dependency versions. The CI script
# ensure-binaries.sh reads refs from this file. To use a different
# version, edit the ref here — branches, tags, and commit SHAs all work.

[components.defra]
prefix = "DEFRA"
repo = "https://github.com/sourcenetwork/defradb.rs"
ref = "main"
cargo_package = "cli"

[components.orbis-node]
prefix = "ORBIS"
repo = "https://github.com/sourcenetwork/orbis-rs"
ref = "jack/integration-testing"
cargo_package = "orbis-node"

[components.cli-tool]
prefix = "ORBIS_CLI"
repo = "https://github.com/sourcenetwork/orbis-rs"
ref = "jack/integration-testing"
cargo_package = "cli-tool"

[components.hubd]
prefix = "HUBD"
repo = "https://github.com/sourcenetwork/hub.rs"
ref = "main"
cargo_package = "hubd"
